<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">nmux-linux overview</title>
  <desc id="desc">A Korean overview image showing nmux-linux as a tmux front-end with sidebar, main pane, status pane, shell pane, and web preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#052e2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
      .panel{fill:#0f172a;stroke:#263244;stroke-width:2}
      .muted{fill:#94a3b8}.text{fill:#e5e7eb}.green{fill:#22c55e}.cyan{fill:#38bdf8}.yellow{fill:#facc15}.red{fill:#fb7185}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="80" r="170" fill="#22c55e" opacity="0.08"/>
  <circle cx="170" cy="560" r="210" fill="#38bdf8" opacity="0.08"/>

  <text x="72" y="78" class="sans green" font-size="24" font-weight="800">NomaDamas Open Source</text>
  <text x="72" y="132" class="sans text" font-size="56" font-weight="900">nmux-linux</text>
  <text x="72" y="174" class="sans muted" font-size="24">Linux용 tmux 멀티세션 프론트엔드</text>
  <text x="72" y="210" class="sans muted" font-size="20">cmux의 빈자리를 tmux 기반 프로젝트 워크스페이스로 채웁니다.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="255" width="1056" height="325" rx="22" fill="#020617" stroke="#334155" stroke-width="2"/>
    <rect x="98" y="285" width="210" height="265" rx="14" class="panel"/>
    <rect x="328" y="285" width="448" height="265" rx="14" class="panel"/>
    <rect x="796" y="285" width="306" height="126" rx="14" class="panel"/>
    <rect x="796" y="430" width="306" height="120" rx="14" class="panel"/>
  </g>

  <text x="118" y="323" class="sans green" font-size="22" font-weight="800">사이드바</text>
  <text x="118" y="360" class="mono text" font-size="18">▸ 1 ✓ api</text>
  <text x="118" y="392" class="mono cyan" font-size="18">  2 ⠋ web</text>
  <text x="118" y="424" class="mono text" font-size="18">  3   docs</text>
  <text x="118" y="470" class="sans muted" font-size="16">클릭 이동 · 닫기</text>
  <text x="118" y="500" class="sans muted" font-size="16">작업 상태 표시</text>

  <text x="358" y="323" class="sans text" font-size="24" font-weight="800">메인 코딩 pane</text>
  <text x="358" y="365" class="mono muted" font-size="19">$ codex / claude / omx</text>
  <rect x="358" y="390" width="360" height="14" rx="7" fill="#1e293b"/>
  <rect x="358" y="390" width="235" height="14" rx="7" fill="url(#accent)"/>
  <text x="358" y="452" class="sans muted" font-size="18">프로젝트별 창을 한 세션에서 관리</text>
  <text x="358" y="486" class="sans muted" font-size="18">tmux 그대로, GUI/데몬 없이 실행</text>

  <text x="824" y="323" class="sans cyan" font-size="22" font-weight="800">상태 / Preview</text>
  <text x="824" y="360" class="mono text" font-size="17">nmux-linux preview URL</text>
  <text x="824" y="386" class="sans muted" font-size="15">웹/명령 미리보기</text>

  <text x="824" y="468" class="sans yellow" font-size="22" font-weight="800">보조 shell</text>
  <text x="824" y="505" class="mono text" font-size="17">git · test · logs</text>
  <text x="824" y="530" class="sans muted" font-size="15">오른쪽 pane 고정</text>

  <g transform="translate(72 595)">
    <circle cx="0" cy="0" r="6" class="green"/><text x="16" y="6" class="sans muted" font-size="17">사이드바 깜빡임 완화</text>
    <circle cx="250" cy="0" r="6" class="cyan"/><text x="266" y="6" class="sans muted" font-size="17">omx HUD pane 정리</text>
    <circle cx="500" cy="0" r="6" class="yellow"/><text x="516" y="6" class="sans muted" font-size="17">우측 preview/webview MVP</text>
  </g>
</svg>
